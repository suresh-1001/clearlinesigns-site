<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You | Clear Line Signs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/main.css">
  <style>
    .ty-wrap {
      min-height: 80vh; display: flex; align-items: center; justify-content: center;
      background: var(--teal-deeper); text-align: center; padding: 80px 28px;
      position: relative; overflow: hidden;
    }
    .ty-wrap::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 70% at 50% 50%, rgba(0,143,165,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .ty-inner { position: relative; z-index: 1; max-width: 500px; }
    .ty-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(0,143,165,0.15); border: 2px solid rgba(0,143,165,0.3);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 28px;
    }
    .ty-icon svg { width: 36px; height: 36px; }
    .ty-inner h1 { font-size: 2.4rem; font-weight: 800; color: var(--white); margin-bottom: 16px; }
    .ty-inner p { font-size: 1.05rem; color: rgba(255,255,255,0.65); line-height: 1.75; margin-bottom: 36px; }
  </style>
</head>
<body>
<script src="./assets/js/shared.js"></script>
<div class="ty-wrap">
  <div class="ty-inner">
    <div class="ty-icon">
      <svg viewBox="0 0 36 36" fill="none"><path d="M6 18l8 8L30 8" stroke="var(--teal-light)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>Quote Request Received!</h1>
    <p>Thank you for reaching out to Clear Line Signs. We've received your request and will be in touch within 1 business day with options, pricing, and recommendations.</p>
    <a href="./index.html" class="btn btn-primary">← Back to Home</a>
  </div>
</div>
</body>
</html>
